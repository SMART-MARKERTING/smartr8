kind = "mobile"
previewPath = "/mobile/"
title = "SMARTR8 Mobile — Adaxa Home Lead Funnel"
version = "1.0.0"
id = "artifacts/smartr8-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/mobile/" ]
localPort = 21804

[services.development]
run = "pnpm --filter @workspace/smartr8-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/smartr8-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/smartr8-mobile", "run", "serve" ]

[services.env]
PORT = "21804"
BASE_PATH = "/mobile/"
