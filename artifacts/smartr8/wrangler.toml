# Cloudflare Pages config for the "smartr8" project — FILE-BASED (source of truth).
#
# This file now carries `pages_build_output_dir`, so Cloudflare reads it on
# every deploy and it SUPERSEDES the dashboard's bindings + plaintext vars.
# (Previously it lacked that key, so Cloudflare logged "not valid … Skipping
# file" and ignored it entirely — all config came from the dashboard.)
#
# SECRETS + plaintext env vars stay in the dashboard (Settings → Environment
# variables) and must NEVER be committed here:
#   SMARTR8_LEAD_CAPTURE_PROD (GHL PIT) · RESEND_API_KEY · TURNSTILE_SECRET_KEY · CRON_SECRET
#   GHL_* IDs · GHL_PIPELINE_ID/STAGE_NEW · optional CRM_LEAD_WEBHOOK
#
# Cloudflare Pages does NOT overwrite dashboard environment variables on deploy
# (unlike Workers `wrangler deploy`), so the dashboard vars survive making this
# file the source of truth — no need to mirror them here. NOTE: the Workers-only
# `keep_vars` key is NOT supported in a Pages config and will hard-fail the
# deploy ("Configuration file for Pages projects does not support keep_vars"),
# so it is deliberately absent.

name = "smartr8"
pages_build_output_dir = "dist/public"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Bindings ──────────────────────────────────────────────────────────
# Now that the file is the source of truth, every binding the Functions use
# must be declared here (dashboard bindings are no longer applied).

[[d1_databases]]
binding = "LEADS_DB"
database_name = "smartr8-leads"
database_id = "b1be7618-d79e-4889-b21f-9b3782e59b00"

[[kv_namespaces]]
binding = "LEAD_DEDUP"
id = "a70020078cbc445eb350f384e1a18be8"

# CF_KV_NAMESPACE — legacy /api/submit-lead rate limiter. It is OPTIONAL:
# submit-lead.ts skips rate limiting when this binding is absent, so leaving it
# off only disables that belt-and-suspenders limiter (no breakage). The account
# has a KV titled "smartr8-leads" (id c36ddeb55cea4e9da51a47526d7aaf73) that is
# the likely target — confirm it against the dashboard binding, then uncomment.
# [[kv_namespaces]]
# binding = "CF_KV_NAMESPACE"
# id = "c36ddeb55cea4e9da51a47526d7aaf73"  # VERIFY in dashboard before enabling
