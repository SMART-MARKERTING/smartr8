# Cloudflare Pages config for the smartr8 site.
#
# LEADS_DB + LEAD_DEDUP bindings are populated below from the provisioned
# Cloudflare resources. See scripts/setup-cloudflare.sh for the original
# one-time setup steps.
#
# Env vars (secrets) are managed in Cloudflare Pages -> Settings ->
# Environment variables (Production + Preview). See README.md.

name = "smartr8"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ─── Bindings (filled in from the live Cloudflare account) ─────────────
#
# IMPORTANT: these only take effect if the Pages project deploys using this
# wrangler.toml. If bindings are instead configured in the Pages dashboard
# (Settings -> Functions -> Bindings), keep both in sync.

[[d1_databases]]
binding = "LEADS_DB"
database_name = "smartr8-leads"
database_id = "b1be7618-d79e-4889-b21f-9b3782e59b00"

[[kv_namespaces]]
binding = "LEAD_DEDUP"
id = "a70020078cbc445eb350f384e1a18be8"

# CF_KV_NAMESPACE is the pre-existing namespace used by the legacy
# /api/submit-lead rate limiter. Two KV namespaces exist on the account
# (LEAD_DEDUP and one named "smartr8-leads"); confirm which one the rate
# limiter expects in the Cloudflare dashboard before uncommenting so we
# don't point it at the wrong store.
#
# [[kv_namespaces]]
# binding = "CF_KV_NAMESPACE"
# id = "<confirm in the Cloudflare dashboard>"
