name: Verify Build on Push

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build smartr8
        run: pnpm --filter @workspace/smartr8 run build
        env:
          BASE_PATH: /
